name: Bug report
description: Report a reproducible problem in Dokimos
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran
      placeholder: dokimos analyze examples/Research-Paper.pdf --format json
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and any relevant `DOKIMOS_*` variables
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
